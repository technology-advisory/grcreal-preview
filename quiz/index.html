<body>

<div class="card-wrapper ds-page">
<div class="card">
      <div id="nav-placeholder"></div>
<script>
    fetch('/includes/nav.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('nav-placeholder').outerHTML = data;
        });
</script>

  <div class="accent-bar"></div>

  <div class="ds-meta">
    <span><span class="dot"></span>GRCreal // expediente: quiz</span>
    <span>archivo: <strong>8 quizzes</strong></span>
  </div>

  <!-- NAV -->
  <div class="quiz-nav">
    <span class="quiz-logo">GRCreal</span>
    <span class="quiz-badge">Quizzes · Catálogo</span>
  </div>

  <div class="header">
    <div class="tag">GRCreal · Quizzes</div>
    <h1 class="headline">
      ¿Cuánto sabes <span class="accent">realmente</span><span class="dim">?</span>
    </h1>
    <p class="subline">
      Elige un tema. <strong>20 preguntas aleatorias</strong>.<br>
      <strong>Sin trampa. Sin PDF. Solo conocimiento real.</strong>

  <div class="body quiz-body">
    <div id="catalog-container" class="quiz-catalog-grid">
      <div class="quiz-catalog-card disabled">
        <div class="quiz-catalog-tag">Cargando...</div>
        <div class="quiz-catalog-title">Cargando quizzes</div>

          .then(response => response.text())
          .then(data => { document.getElementById('footer-placeholder').innerHTML = data; });
  </script>

</div>
</div>


<script>
// Cargar catálogo desde /data/quiz.json
async function loadCatalog() {
  try {
    const response = await fetch('/data/quiz.json');
    if (!response.ok) throw new Error('No se pudo cargar el catálogo');
    const data = await response.json();
    // Mostrar TODOS los quizzes, no solo los activos
    renderCatalog(data.quizzes);
  } catch (error) {
    console.error('Error cargando catálogo:', error);
    document.getElementById('catalog-container').innerHTML = `
      <div class="quiz-catalog-card disabled">
        <div class="quiz-catalog-tag">Error</div>
        <div class="quiz-catalog-title">No se pudo cargar el catálogo</div>
        <div class="quiz-catalog-desc">Inténtalo de nuevo más tarde.</div>
      </div>
    `;
  }
}

function renderCatalog(quizzes) {
  const container = document.getElementById('catalog-container');
  container.innerHTML = quizzes.map(quiz => {
    const isActive = quiz.activo === true;
    const cardClass = `quiz-catalog-card ${isActive ? '' : 'disabled'}`;
    const hrefAttr = isActive ? `href="${quiz.pagina}"` : '';
    
    let comingHtml = '';
    let statusHtml = '';
    
    if (isActive) {
      statusHtml = '<div class="quiz-catalog-status">✅ Disponible →</div>';
    } else {
      comingHtml = '<div class="coming-badge">🔒 Próximamente</div>';
      statusHtml = '<div class="quiz-catalog-status" style="color:var(--faint);">📅 En desarrollo</div>';
    }
    
    return `
      <a ${hrefAttr} class="${cardClass}" ${!isActive ? 'onclick="return false;"' : ''}>
        ${comingHtml}
        <div class="quiz-catalog-tag">${escapeHtml(quiz.tag)}</div>
        <div class="quiz-catalog-title">${escapeHtml(quiz.titulo)}</div>
        <div class="quiz-catalog-desc">${escapeHtml(quiz.descripcion)}</div>
        ${statusHtml}
      </a>
    `;
  }).join('');
}

function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Inicializar
document.addEventListener('DOMContentLoaded', loadCatalog);
</script>

</body>
</html>
